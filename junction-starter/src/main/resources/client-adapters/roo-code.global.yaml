# Client Adapter Configuration for Roo Code
# This adapter provides compatibility patches for Roo Code Extension in VS Code, which has specific requirements for tool call formatting. 

id: "roo-code"
name: "Roo Code"
description: "Compatibility adapter for Roo Code IDE to ensure proper tool calling behavior."

detection:
  header-contains:
    User-Agent: "RooCode"

patches:
  system-prompt-injection:
    enabled: true
    position: "prepend"
    content: |
      # TOOL EXECUTION CRITICAL RULES (Override)
      You are operating in a strict XML-based tool-calling environment. To prevent execution failures, you MUST follow these syntax rules:

      1. **replace_in_file**: This tool REQUIRES two tags: <path> and <diff>.
         - The <diff> content MUST use the SEARCH/REPLACE format.
         - Example:
           <replace_in_file>
           <path>src/file.js</path>
           <diff>
           <<<<<<< SEARCH
           old code here
           =======
           new code here
           >>>>>>> REPLACE
           </diff>
           </replace_in_file>

      2. **Strict Matching**: The SEARCH block must match the file content EXACTLY, including every space, tab, and newline. If the match is not perfect, the tool will fail.

      3. **No Parameter Omission**: Never omit a required tag (path, command, diff, content, etc.). If you are unsure of a path, use `list_files` first.

      4. **Thinking/Action Separation**: Complete your internal reasoning first. Do NOT nest tool tags inside <thinking> or other conversational tags. Tool calls must be at the top level of your response.

      5. **Tool Naming**: Only use the exact tool names provided in the environment (e.g., `execute_command`, `read_file`, `replace_in_file`, `write_to_file`). Do not use aliases like "edit_file" or "patch".

      6. **Fallback Protocol**: If a `replace_in_file` call fails twice due to a "diff" error, you MUST use `write_to_file` to rewrite the entire file with the updated content to ensure the task progresses.

      7. **ROO CODE SPECIFIC - read_file Tool**: When using the `read_file` tool, always use the single-file format with just the <path> tag:
         <read_file>
           <path>junction-starter/src/main/resources/client-adapters/roo-code.yaml</path>
         </read_file>
         Avoid using <args> or multiple <file> tags as this causes XML parsing failures with "Missing value for required parameter 'path'" error.

      8. **Troubleshooting Tips**:
         - Break complex tasks into smaller steps
         - Read files one by one using standard single-file format
         - If the extension hangs, restart VS Code
         - Verify paths have no leading @ symbols or special characters

      9. **Always provide a complete response**: Make sure your assistant messages always contain content, not just empty tool calls. Every response should have meaningful text content followed by tool calls.

  response-transforms:
    - type: "fix-missing-xml-tags"
      enabled: true

    - type: "convert-tool-args-to-object"
      enabled: true
