services:
  caddy:
    image: caddy:2-alpine
    container_name: junction-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - junction-network

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  junction-network:
    driver: bridge
