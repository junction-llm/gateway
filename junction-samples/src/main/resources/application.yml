server:
  port: 8080
  address: 0.0.0.0

junction:
  providers:
    ollama:
      enabled: true
      base-url: http://localhost:11434
      default-model: llama3.1:latest
    gemini:
      enabled: false
      api-key: ${GEMINI_API_KEY:}
      model: gemini-1.5-flash
  
  security:
    api-key:
      required: true
      
      # Supported backends: memory, file, h2, postgresql
      storage: memory
      
      # File backend: YAML snapshot rewritten on key mutations and usage updates
      # file-path: ${JUNCTION_API_KEYS_FILE:./api-keys.yml}
      
      # H2 backend: persistent JDBC storage for single-node deployments
      # h2-url: jdbc:h2:file:${JUNCTION_H2_PATH:./data/junction};DB_CLOSE_DELAY=-1
      # h2-username: sa
      # h2-password: ""
      
      # PostgreSQL backend: requires the PostgreSQL JDBC driver on the app classpath.
      # Enable it with direct Spring property or environment overrides instead of a dedicated profile.
      # postgresql-url: ${JUNCTION_POSTGRES_URL:jdbc:postgresql://localhost:5432/junction}
      # postgresql-username: ${JUNCTION_POSTGRES_USER:junction}
      # postgresql-password: ${JUNCTION_POSTGRES_PASSWORD:}
      
      preconfigured:
        - key: ${JUNCTION_API_KEY_1:}
          name: "Development Key"
          tier: ENTERPRISE  # Options: FREE, PRO, ENTERPRISE
        
        - key: ${JUNCTION_API_KEY_AGENT_ZERO:}
          name: "Agent Zero Key"
          tier: FREE  # Most restrictive tier (20 req/min, 200/day, 1,000/month)
  
  client-adapters:
    classpath-enabled: true    
    external-directory: ${JUNCTION_CLIENT_ADAPTERS_DIR:}
    hot-reload: true    
    external-priority: true

  logging:
    chat-response:
      enabled: false

  observability:
    admin:
      cache-write-enabled: false
    security:
      enabled: true
      public-health-enabled: true
      username: ${JUNCTION_OBSERVABILITY_SECURITY_USERNAME:actuator}
      password: ${JUNCTION_OBSERVABILITY_SECURITY_PASSWORD:}

spring:
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      INDENT_OUTPUT: false

logging:
  level:
    io.junction.gateway: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoint:
    health:
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health
        # Expose protected management endpoints only when you also set
        # JUNCTION_OBSERVABILITY_SECURITY_PASSWORD and want authenticated access:
        # include: health,info,metrics,junction
        # Add junctioncache only when you intentionally enable write access:
        # include: health,info,metrics,junction,junctioncache
